    <style>
      .add_doctor{
     position: relative;
}
        .doctor-form{
            background:#fff;
            padding:40px 50px 40px 50px;
            border-radius:12px;
            width:400px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }
        .doctor-form h2{
            text-align:center;
            margin-bottom:20px;
            color:#1e3c72;
        }
        .form-group{
            position:relative;
            margin-bottom:18px;
        }
        .form-group input,
        .form-group select{
            width:100%;
            padding:10px 10px;
            border:1px solid #ccc;
            outline:none;
            border: none;
            border-bottom: 2px solid #ccc;
            font-size:14px;
        }
        .form-group label{
            position:absolute;
            left:10px;
            top:50%;
            transform:translateY(-50%);
            background:#fff;
            padding:0 5px;
            font-size:14px;
            color:#777;
            pointer-events:none;
            transition:0.3s ease;
        }
        .form-group input:focus + label,
        .form-group input:valid + label,
        .form-group select:focus + label,
        .form-group select:valid + label{
            top:-8px;
            font-size:12px;
            color:#1e3c72;
        }
        .btn-group{
            display:flex;
            gap:10px;
        }

        .submit-btn{
            background:#1e3c72;
            color:#fff;
        }
        
        button:active {
    background-color: pink;
}
        .reset-btn{
            background:#16305f;
            color:#fff;
        }
        .reset-btn:hover{
            color: #ccc;
            background:#777;
            background-color: pink;
        }
        .cancel-btn{
            background:#16305f;
            color:#fff;
        }

        .btn-group button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:15px;
            cursor:pointer;
        }

        .submit-btn:hover{ background:#16305f; }
        .reset-btn:hover{ background:#16305f; }
        .cancel-btn:hover{ background:#16305f; }

    </style>
<div class="add_doctor">
    <span class="close" onclick="closeDoctorModal()">&times;</span>

<div class="doctor-form">
    <h2>Doctor Registration</h2>
    <form action="{% url 'add_doctor' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="Doctor_name" required>
            <label>Doctor Name</label>
        </div>
        <div class="form-group">
            <select name="Gender" required>
                <option value="" disabled selected></option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
            <label>Gender</label>
        </div>
        <div class="form-group">
            <select name="Specialization" required>
                <option value="" disabled selected></option>
                <option value="Cardiologist">Cardiologist</option>
                <option value="Dermatologist">Dermatologist</option>
                <option value="Pediatrician">Pediatrician</option>
                <option value="Gynecologist">Gynecologist</option>
                <option value="Orthopedic">Orthopedic</option>
                <option value="Neurologist">Neurologist</option>
                <option value="ENT Specialist">ENT Specialist</option>
                <option value="General Physician">General Physician</option>
            </select>
            <label>Specialization</label>
        </div>
        <div class="form-group">
            <input type="text" name="Qualification" required>
            <label>Qualification</label>
        </div>
        <div class="form-group">
            <input type="number" name="Experience" required>
            <label>Experience (Years)</label>
        </div>
        <div class="form-group">
            <input type="tel" name="Mobileno" required>
            <label>Mobile Number</label>
        </div>
        <div class="form-group">
            <input type="email" name="Email" required>
            <label>Email Address</label>
        </div>
        <div class="form-group">
             <select name="Ward" required>
                <option  disabled selected name="General"></option>
                <option value="ICU">ICU</option>
                <option value="General">General</option>
                <option value="Private">Private</option>
                <option value="Emergency">Emergency</option>
                <option value="OT">OT</option>
                <option value="Maternity">Maternity</option>
            </select>
            <label>Ward / Department</label>
        </div>
        <div class="form-group">
            <input type="time" name="Available_from">
             <label for="available_from">Available From:</label>
        </div>
        <div class="form-group">
            <input type="time" name="Available_to" >
            <label for="available_to">Available To:</label>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
            <button type="button" class="cancel-btn" onclick="closeDoctorModal()">Cancel</button>
        </div>

    </form>
</div>
</div>
