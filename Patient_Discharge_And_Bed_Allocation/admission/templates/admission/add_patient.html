<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>
    <style>
        .add_patient{
            position: relative;
        }
        .patient-form{
            background:#fff;
            padding:25px;
            border-radius:14px;
            width:450px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }
        .patient-form h2{
            text-align:center;
            margin-bottom:20px;
            color:#1e3c72;
        }
        .form-group{
            position:relative;
            margin-bottom:18px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
            font-size:14px;
        }
        .form-group textarea{
            resize:none;
            height:70px;
        }
        .form-group label{
            position:absolute;
            left:10px;
            top:50%;
            transform:translateY(-50%);
            background:#fff;
            padding:0 5px;
            font-size:14px;
            color:#777;
            pointer-events:none;
            transition:0.3s ease;
        }
        .form-group input:focus + label,
        .form-group input:valid + label,
        .form-group select:focus + label,
        .form-group select:valid + label,
        .form-group textarea:focus + label,
        .form-group textarea:valid + label{
            top:-8px;
            font-size:12px;
            color:#1e3c72;
        }
        .btn-group{
            display:flex;
            gap:10px;
        }
        .btn-group button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:15px;
            cursor:pointer;
            color:#fff;
        }
        .submit-btn{ background:#1e3c72; }
        .reset-btn{ background:#1e3c72; }
        .cancel-btn{ background:#1e3c72; }

        .submit-btn:hover{ background:#1e3c72; }
        .reset-btn:hover{ background:#1e3c72; }
        .cancel-btn:hover{ background:#1e3c72; }
    </style>
<div class="add_patient">
     <span class="close" onclick="closePatientModal()">&times;</span>
<div class="patient-form">
    <form action="{% url 'add_patient' %}" method="post">
        {% csrf_token %}
    <h2>Patient Registration Form</h2>
        <div class="form-group">
            <input type="text" name="Patient_name" required>
            <label>Patient Name</label>
        </div>
        <div class="form-group">
            <select name="Gender" required>
                <option  disabled selected name="Gender"></option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
            </select>
            <label>Gender</label>
        </div>
        <div class="form-group">
            <input type="number" name="Age" required>
            <label>Age</label>
        </div>
        <div class="form-group">
            <input type="tel" name="Mobileno"required>
            <label>Mobile Number</label>
        </div>
        <div class="form-group">
            <input type="email" name="Email" required>
            <label>Email</label>
        </div>
        <div class="form-group">
            <input type="text" name="Address" required>
            <label>Address</label>
        </div>
        <div class="form-group">
             <select name="Ward" required>
                <option  disabled selected name="General"></option>
                <option value="ICU">ICU</option>
                <option value="General">General</option>
                <option value="Private">Private</option>
                <option value="Emergency">Emergency</option>
                <option value="OT">OT</option>
                <option value="Maternity">Maternity</option>
            </select>
            <label>Ward / Department</label>
        </div>
        <div class="form-group">
            <input type="text" name="Problem" required>
            <label>Disease / Problem</label>
        </div>
        <div class="form-group">
            <textarea name="Remarks" required></textarea>
            <label>Remarks / Notes</label>
        </div>
        <div class="btn-group">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
            <button type="button" class="cancel-btn" onclick="closePatientModal()">Cancel</button>
        </div>
    </form>
</div>
</div>
