<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Bed Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(to bottom right, #f8fafc, #dbeafe);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #6b7280;
        }

        .beds-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .beds-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .bed-card {
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .bed-card.occupied {
            background-color: #ffe4e6;
            border: 2px solid #fecdd3;
        }

        .bed-card.available {
            background-color: #d1fae5;
            border: 2px solid #a7f3d0;
        }

        .bed-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.15);
        }

        .bed-card.occupied:hover {
            background-color: #fecdd3;
        }

        .bed-card.available:hover {
            background-color: #a7f3d0;
        }

        .bed-icon {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .bed-number {
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .bed-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        .bed-status.occupied {
            background-color: #fecdd3;
            color: #be123c;
        }

        .bed-status.available {
            background-color: #a7f3d0;
            color: #065f46;
        }

        .patient-name {
            text-align: center;
            color: #4b5563;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.875rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-color {
            width: 1rem;
            height: 1rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
        }

        .legend-color.occupied {
            background-color: #fecdd3;
        }

        .legend-color.available {
            background-color: #a7f3d0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal:target {
            display: flex;
        }

        .modal-content {
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 42rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            background-color: #e0f2fe;
            padding: 1.5rem;
            border-radius: 0.75rem 0.75rem 0 0;
            border-bottom: 2px solid #bae6fd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.875rem;
            color: #374151;
        }

        .close-btn {
            color: #4b5563;
            font-size: 2rem;
            text-decoration: none;
            line-height: 1;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #1f2937;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .info-section {
            padding: 1.25rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .info-section.patient {
            background-color: #eff6ff;
            border-left: 4px solid #93c5fd;
        }

        .info-section.doctor {
            background-color: #f0fdf4;
            border-left: 4px solid #86efac;
        }

        .info-section.empty {
            background-color: transparent;
            border: none;
            text-align: center;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #374151;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-icon {
            font-size: 1.875rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .info-item {
            margin-bottom: 0.5rem;
        }

        .info-label {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.125rem;
            color: #374151;
        }

        .info-item.full-width {
            grid-column: span 2;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .empty-text {
            color: #6b7280;
        }

        .modal-footer {
            background-color: #f9fafb;
            padding: 1rem;
            border-radius: 0 0 0.75rem 0.75rem;
            text-align: right;
        }

        .btn-close {
            background-color: #bae6fd;
            color: #374151;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .btn-close:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hospital Bed Management</h1>
            <p class="subtitle">Click on any bed to view patient and doctor information</p>
        </header>

        <div class="beds-grid">

{% for bed in beds %}

<a class="bed-card available">

    <div class="bed-icon">🛏️</div>

    <div class="bed-number">
        Bed {{bed}}
    </div>

    <div class="bed-status available">
        Available
    </div>

</a>

{% endfor %}

            <!-- Bed 1 - Occupied -->
           
    </div>

</body>
</html>
